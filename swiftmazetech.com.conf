# HTTP: everything -> https://www.swiftmazetech.com
server {
    listen 80;
    server_name swiftmazetech.com www.swiftmazetech.com;
    return 301 https://www.swiftmazetech.com$request_uri;
}

# HTTPS: bare domain -> www
server {
    listen 443 ssl;
    server_name swiftmazetech.com;

    ssl_certificate /etc/letsencrypt/live/swiftmazetech.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swiftmazetech.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://www.swiftmazetech.com$request_uri;
}

# HTTPS: main site on www
server {
    listen 443 ssl;
    server_name www.swiftmazetech.com;

    ssl_certificate /etc/letsencrypt/live/swiftmazetech.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swiftmazetech.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/html/swiftmazetech_client_app/build;
    index index.php index.html;

    # =========================
    # NEXT.JS APP (/tm) - PORT 3003
    # MUST BE ABOVE location /
    # =========================
    location ^~ /tm/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Also handle exact /tm (no redirect loop)
    location = /tm {
        proxy_pass http://127.0.0.1:3003/tm;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location / {
        try_files $uri /index.html;        
    }

    location ^~ /wordpress {
        root /var/www/html/swiftmazetech_client_app/public;

        try_files $uri $uri/ /wordpress/index.php?$args;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    location ^~ /nrg {
        root /var/www/html/swiftmazetech_client_app/public;

        try_files $uri $uri/ /nrg/index.php?$args;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    location ^~ /payout/ {
      root /var/www/html/swiftmazetech_client_app/public;
      try_files $uri $uri/ =404;

      location ~ ^/payout/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      }

      location ^~ /payout/cashfree/logs/ { deny all; return 403; }

    }
}

